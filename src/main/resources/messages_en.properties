# Pill legend (expanded descriptions with examples + usage hints)
detail.legend.title=What do these capabilities mean?
pill.legend.vision=Lets the model "see" images and reason about their content. Accepts photos, screenshots, diagrams or charts alongside your question.\n\nExample: upload a photo of an invoice and ask it to extract the total, date and vendor. Or pass it a UML diagram and ask which classes are present.\n\nWhen useful: scanned-document analysis, contextual OCR, image description for accessibility, debugging from screenshots.
pill.legend.tools=The model can call functions you define (tool calling / function calling) and use their results to build its answer. Instead of inventing data, it triggers real actions.\n\nExample: define a function "checkStock(product)" and the model invokes it when asked "are there 12 units of SKU-42?".\n\nWhen useful: agents, API integrations (weather, database, email), workflow automation where the model decides which tool to use and with what arguments.
pill.legend.thinking=The model reasons step by step in a visible way before delivering the final answer. "Thinking" tokens are separated from the response so you can audit the process.\n\nExample: for "if Ana has twice as much as Luis and together they sum 30, how much does Luis have?", the model shows the chain (setup, equations, solve) and then answers "10".\n\nWhen useful: math problems, logic, complex decisions where you want to audit the reasoning.
pill.legend.embedding=Converts text into dense numeric vectors (embeddings) that represent semantic meaning. Does NOT produce conversational answers.\n\nExample: "dog" and "puppy" yield very similar vectors; "dog" and "car" yield distant ones.\n\nWhen useful: semantic search, RAG (Retrieval Augmented Generation), text classification, duplicate detection, similarity-based recommendations.
pill.legend.code=Model optimized to understand and generate code in many languages. Its weights are tuned with programming corpora.\n\nExample: ask "implement quicksort in Python with type hints" and it returns idiomatic, typed code that handles edge cases.\n\nWhen useful: advanced completion, refactoring, explaining legacy code, generating tests, translating between languages (Java → Kotlin), generating SQL or regex.
pill.legend.multimodal=Accepts several input types at once: text, images, and in some cases audio. The answer is still text, but the model reasons over all inputs.\n\nExample: upload a photo of a dish and ask in writing "what ingredients does it have and how do I cook it?".\n\nWhen useful: assistants with multiple modalities, combined document + photo analysis, accessibility, tech support with screenshots.
pill.legend.math=Model tuned for mathematical reasoning: symbolic arithmetic, algebra, derivatives, word problems and proofs.\n\nExample: "solve the integral of x²·sin(x) by parts" — step-by-step development with the final answer.\n\nWhen useful: educational tutoring, formula validation, data-science and quantitative-finance support.
pill.legend.reasoning=Specialized in logical inference and multi-step problems. Handles deduction, planning and chained decisions better than a generic chat.\n\nExample: "If A>B and B>C, and C is even, what can you deduce about A?" — it analyzes, chains premises and answers with justification.\n\nWhen useful: planning agents, legal analysis, business decisions with multiple constraints, chess or puzzle-style problems.
pill.legend.audio=The model can take audio as input (transcription, understanding) and, in some cases, generate speech as output.\n\nExample: send it an mp3 of a meeting and ask for a bullet-point summary of the key agreements.\n\nWhen useful: dictation, voice assistants, automatic minutes, call transcription, accessibility for visually impaired users.
pill.legend.size=Indicates how many parameters this model variant has (B = billions, M = millions). More parameters usually mean more capability but also more RAM/VRAM and lower speed.\n\nExample: 7B = 7 billion parameters, ~4–5 GB in RAM with Q4 quantization.\n\nWhen useful: deciding which variant to download for your hardware. For a laptop without a dedicated GPU, 7B–13B; for a workstation with 24 GB VRAM, up to 30B; for servers, 70B+.
pill.legend.generic=Generic model tag that doesn't fit standard categories (e.g. family name or training variant).

# About - Changelog
about.changelog.title=Historial de Versiones
about.changelog.subtitle=Descubre la evolución y mejoras de Graden Models
about.changelog.v051.title=v0.5.1
about.changelog.v051.date=Mayo 2026
about.changelog.v051.item1=Corregido el contador acumulado de descargas sumando todos los releases históricos.
about.changelog.v051.item2=Solucionado bug de duplicación de métricas de tokens y tiempo en las respuestas del chat.
about.changelog.v050.title=v0.5.0
about.changelog.v050.date=Abril 2026
about.changelog.v050.item1=Integración nativa de RAG vía LangChain4j para indexación y consulta de documentos locales.
about.changelog.v050.item2=Persistencia de chats locales en formato JSON mediante Jackson.
about.changelog.v050.item3=Rediseño de la barra de navegación lateral y el panel de configuración.
about.changelog.v040.title=v0.4.0
about.changelog.v040.date=Marzo 2026
about.changelog.v040.item1=Soporte multimodal completo para procesar imágenes con modelos de visión locales.
about.changelog.v040.item2=Previsualización interactiva de imágenes adjuntas en la barra de entrada del chat.
about.changelog.v040.item3=Streaming optimizado de respuestas mediante un parser JSON nativo de alto rendimiento.
about.changelog.v030.title=v0.3.0
about.changelog.v030.date=Enero 2026
about.changelog.v030.item1=Lanzamiento público inicial con arquitectura desacoplada MVC-lite.
about.changelog.v030.item2=Soporte completo para temas claro/oscuro integrando componentes AtlantaFX.


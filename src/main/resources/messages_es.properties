# Pill capability tooltips
pill.tooltip.vision=Visión: el modelo puede analizar imágenes y describir su contenido.
pill.tooltip.tools=Herramientas: el modelo puede invocar funciones externas (tool calling) para extender sus capacidades.
pill.tooltip.thinking=Razonamiento: el modelo expone su proceso de pensamiento paso a paso antes de responder.
pill.tooltip.embedding=Embeddings: el modelo convierte texto en vectores numéricos para búsqueda semántica o RAG.
pill.tooltip.code=Código: el modelo está especializado en generación y comprensión de código.
pill.tooltip.multimodal=Multimodal: el modelo acepta múltiples tipos de entrada (texto, imagen, audio…).
pill.tooltip.math=Matemáticas: el modelo está optimizado para razonamiento matemático y resolución de problemas.
pill.tooltip.reasoning=Razonamiento: el modelo destaca en tareas de inferencia y lógica compleja.
pill.tooltip.audio=Audio: el modelo puede procesar entradas o salidas de audio.
pill.tooltip.size=Tamaño en parámetros del modelo (ej. 7B = 7 mil millones de parámetros).
pill.tooltip.generic=Etiqueta del modelo.

# Pill legend (expanded descriptions with examples + usage hints)
detail.legend.title=¿Qué significan las capacidades?
pill.legend.vision=Permite al modelo "ver" imágenes y razonar sobre su contenido. Acepta fotos, capturas, diagramas o gráficos junto con tu pregunta.\n\nEjemplo: subir una foto de una factura y pedirle que extraiga el total, la fecha y el proveedor. O pasarle un diagrama UML y preguntar qué clases lo componen.\n\nCuándo te sirve: análisis de documentos escaneados, OCR contextual, descripción de imágenes para accesibilidad, depuración de capturas de pantalla.
pill.legend.tools=El modelo puede llamar funciones que tú definas (tool calling / function calling) y usar el resultado para construir su respuesta. En lugar de inventar datos, ejecuta acciones reales.\n\nEjemplo: le defines una función "consultarStock(producto)" y el modelo la invoca cuando le preguntas "¿hay 12 unidades del SKU-42?".\n\nCuándo te sirve: agentes, integraciones con APIs (clima, base de datos, correo), automatización de flujos donde el modelo decide qué herramienta usar y con qué argumentos.
pill.legend.thinking=El modelo razona paso a paso de forma visible antes de dar la respuesta final. Los tokens de "pensamiento" se separan de la respuesta para que el usuario vea el proceso.\n\nEjemplo: ante "si Ana tiene el doble que Luis y entre ambos suman 30, ¿cuánto tiene Luis?", el modelo expone su cadena de razonamiento (planteamiento, ecuaciones, despeje) y luego responde "10".\n\nCuándo te sirve: problemas matemáticos, lógica, decisiones complejas donde quieres auditar el porqué de la respuesta.
pill.legend.embedding=Convierte texto en vectores numéricos densos (embeddings) que representan el significado semántico. NO genera respuestas conversacionales.\n\nEjemplo: con "perro" y "cachorro" obtienes vectores muy similares; con "perro" y "automóvil", vectores distantes.\n\nCuándo te sirve: búsqueda semántica, RAG (Retrieval Augmented Generation), clasificación de textos, detección de duplicados, recomendaciones basadas en similitud.
pill.legend.code=Modelo optimizado para entender y generar código en muchos lenguajes. Sus pesos están afinados con corpora de programación.\n\nEjemplo: le pides "implementa quicksort en Python con tipos" y devuelve código idiomático, con tipado, manejando casos borde.\n\nCuándo te sirve: autocompletado avanzado, refactor, explicación de código legacy, generación de tests, traducción entre lenguajes (Java → Kotlin), generación de SQL o regex.
pill.legend.multimodal=Acepta varios tipos de entrada simultáneos: texto, imágenes, y en algunos casos audio. La respuesta sigue siendo texto, pero el modelo razona sobre todos los inputs.\n\nEjemplo: subir una foto de un plato y preguntar por escrito "¿qué ingredientes tiene y cómo lo preparo?".\n\nCuándo te sirve: asistentes con varias modalidades, análisis combinado documento + foto, accesibilidad, soporte técnico con capturas.
pill.legend.math=Modelo afinado para razonamiento matemático: aritmética simbólica, álgebra, derivadas, problemas de palabras y demostraciones.\n\nEjemplo: "resuelve la integral de x²·sen(x) por partes" — desarrollo paso a paso con la solución final.\n\nCuándo te sirve: tutoría educativa, validación de fórmulas, soporte para data science y finanzas cuantitativas.
pill.legend.reasoning=Especializado en inferencia lógica y problemas de múltiples pasos. Maneja deducciones, planificación y decisiones encadenadas mejor que un chat genérico.\n\nEjemplo: "Si A>B y B>C, y C es par, ¿qué puedes deducir sobre A?" — analiza, encadena premisas y responde con justificación.\n\nCuándo te sirve: agentes que planifican, análisis legal, decisiones de negocio con múltiples restricciones, ajedrez o problemas tipo puzzle.
pill.legend.audio=El modelo puede recibir audio como entrada (transcripción, comprensión) y, en algunos casos, generar voz como salida.\n\nEjemplo: enviarle un mp3 de una reunión y pedirle un resumen con bullets de los acuerdos clave.\n\nCuándo te sirve: dictado, asistentes por voz, minutas automáticas, transcripción de llamadas, accesibilidad para personas con dificultad visual.
pill.legend.size=Indica cuántos parámetros tiene esta variante del modelo (B = miles de millones, M = millones). Más parámetros suele significar más capacidad pero también más RAM/VRAM y velocidad menor.\n\nEjemplo: 7B = 7 mil millones de parámetros, aprox. 4–5 GB en RAM con cuantización Q4.\n\nCuándo te sirve: decidir qué variante descargar según tu hardware. Para portátil sin GPU dedicada, 7B–13B; para workstation con 24 GB de VRAM, hasta 30B; para servidores, 70B+.
pill.legend.generic=Etiqueta general del modelo que no encaja en categorías estándar (ej. nombre de familia o variante de entrenamiento).

# About - Misión/Storytelling
about.mission.title=¿Por qué Graden Models?
about.mission.tagline=IA local, sin nube, sin compromisos.
about.mission.text=Graden Models nació del deseo de democratizar el acceso a LLMs locales. Creemos que todos deberían tener una interfaz nativa, ligera y eficiente para ejecutar modelos de IA sin fricciones técnicas. Sin dependencias en la nube, sin preocupaciones de privacidad—solo inteligencia local pura al alcance de tu mano.

